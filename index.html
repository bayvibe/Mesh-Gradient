<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网格渐变背景调试器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f1ee;
      --surface: #faf9f7;
      --card: #ffffff;
      --border: #e5e2de;
      --border-focus: #c17f59;
      --text-1: #3a3633;
      --text-2: #8a8580;
      --text-3: #b0aaa3;
      --accent: #c17f59;
      --accent-light: rgba(193, 127, 89, 0.08);
      --accent-mid: rgba(193, 127, 89, 0.15);
      --red: #c45c52;
      --red-light: rgba(196, 92, 82, 0.08);
      --code-bg: #2b2926;
      --code-text: #ddd8d2;
      --code-accent: #c17f59;
      --radius-sm: 6px;
      --radius-md: 8px;
      --shadow-popup: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── 左侧面板 ─── */
    .controls {
      width: 340px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      max-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .controls-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 10;
    }

    .controls-header h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-1);
    }

    .controls-header p {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
      line-height: 1.5;
    }

    .controls-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      transition: all 0.12s;
      padding: 0;
    }

    .icon-btn:hover {
      color: var(--text-1);
      border-color: var(--text-3);
    }

    .icon-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .icon-btn.danger:hover {
      color: var(--red);
      border-color: var(--red);
      background: var(--red-light);
    }

    .icon-btn svg {
      width: 14px;
      height: 14px;
    }

    .controls-body {
      padding: 16px 20px 24px;
      flex: 1;
      overflow-y: auto;
    }

    .controls-footer {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--card);
      position: sticky;
      bottom: 0;
      display: flex;
      gap: 6px;
    }

    .controls-footer .btn {
      flex: 1;
      margin-bottom: 0;
    }

    /* ─── 控制组 ─── */
    .control-group { margin-bottom: 20px; }
    .control-group:last-child { margin-bottom: 0; }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-label span {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section-label .value-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    /* ─── 颜色输入 ─── */
    .color-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .color-input-row input[type="color"] {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: transparent;
      padding: 2px;
    }

    .color-input-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    .color-input-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

    .color-input-row input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-1);
      background: var(--surface);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .color-input-row input[type="text"]:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    /* ─── Range 滑块 ─── */
    input[type="range"] {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--accent);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 4px var(--accent-light);
    }

    /* ─── 按钮 ─── */
    .btn {
      width: 100%;
      padding: 9px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 6px;
      background: var(--card);
      color: var(--text-2);
      text-align: center;
    }

    .btn:hover { border-color: var(--text-3); color: var(--text-1); }
    .btn:active { transform: scale(0.99); }

    .btn-primary {
      background: var(--text-1);
      color: var(--surface);
      border-color: var(--text-1);
    }

    .btn-primary:hover { background: #2a2724; border-color: #2a2724; color: #fff; }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border-color: var(--red);
    }

    .btn-danger:hover { background: var(--red-light); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ─── 点列表 ─── */
    .point-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .point-item {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
    }

    .point-item:hover { background: var(--surface); }

    .point-item.selected {
      background: var(--accent-light);
      border-color: var(--accent-mid);
    }

    .point-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .point-info { flex: 1; min-width: 0; }

    .point-hex {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      color: var(--text-1);
      font-size: 12px;
    }

    .point-pos {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 1px;
    }

    .point-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.12s;
    }

    .point-item:hover .point-actions,
    .point-item.selected .point-actions { opacity: 1; }

    .point-btn {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: background 0.12s;
      background: transparent;
      color: var(--text-3);
    }

    .point-btn:hover { background: var(--border); color: var(--text-1); }

    .point-btn-delete:hover { background: var(--red-light); color: var(--red); }

    /* ─── 代码输出 ─── */
    .output-code {
      background: var(--surface);
      color: var(--text-1);
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      line-height: 1.7;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .output-code::-webkit-scrollbar { width: 4px; }
    .output-code::-webkit-scrollbar-track { background: transparent; }
    .output-code::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ─── 右侧画布 ─── */
    .canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    .canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      cursor: crosshair;
    }

    /* ─── 渐变控制点 ─── */
    .gradient-point {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      z-index: 10;
    }

    .gradient-point::before {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
    }

    .gradient-point:hover {
      transform: translate(-50%, -50%) scale(1.25);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      z-index: 11;
    }

    .gradient-point.dragging {
      cursor: grabbing;
      transform: translate(-50%, -50%) scale(1.3);
    }

    .gradient-point.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px var(--accent), 0 2px 8px rgba(0,0,0,0.25);
    }

    .blur-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.35);
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: all 0.15s ease;
    }

    .gradient-point:hover .blur-ring,
    .gradient-point.selected .blur-ring {
      border-color: rgba(193, 127, 89, 0.5);
    }

    /* ─── 悬浮编辑菜单 ─── */
    .point-popup {
      position: absolute;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      width: 220px;
      box-shadow: var(--shadow-popup);
      opacity: 0;
      transform: scale(0.95) translateY(4px);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .point-popup.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    .popup-row {
      margin-bottom: 12px;
    }

    .popup-row:last-child {
      margin-bottom: 0;
    }

    .popup-row label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .popup-row label .val {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 10px;
      color: var(--text-3);
      text-transform: none;
      letter-spacing: 0;
    }

    .popup-color-block {
      position: relative;
    }

    .sv-picker {
      position: relative;
      width: 100%;
      height: 120px;
      border-radius: var(--radius-sm);
      cursor: crosshair;
      overflow: hidden;
    }

    .sv-picker canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: var(--radius-sm);
    }

    .sv-cursor {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.3);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .hue-bar {
      position: relative;
      width: 100%;
      height: 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      background: linear-gradient(to right,
        hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%),
        hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%));
    }

    .hue-cursor {
      position: absolute;
      top: -1px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 1px 4px rgba(0,0,0,0.2);
      transform: translate(-50%, 0);
      pointer-events: none;
      z-index: 2;
    }

    .popup-hex-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .popup-hex-row input[type="text"] {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-1);
      background: var(--surface);
      text-align: center;
    }

    .popup-hex-row input[type="text"]:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .popup-actions {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .popup-actions button {
      flex: 1;
      padding: 6px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      background: var(--card);
      color: var(--text-2);
      transition: all 0.12s;
    }

    .popup-actions button:hover {
      border-color: var(--text-3);
      color: var(--text-1);
    }

    .popup-actions .popup-delete {
      color: var(--red);
      border-color: var(--red);
    }

    .popup-actions .popup-delete:hover {
      background: var(--red-light);
    }

    /* ─── 网格 ─── */
    .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.2s ease;
      background-image:
        linear-gradient(rgba(58, 54, 51, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58, 54, 51, 0.06) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .grid-overlay.visible { opacity: 1; }

    /* ─── 坐标 ─── */
    .coord-display {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(43, 41, 38, 0.85);
      color: var(--code-text);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      z-index: 50;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--code-bg);
      color: var(--code-text);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 2000;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─── 全屏预览 ─── */
    .fullscreen-overlay {
      position: fixed;
      inset: 0;
      z-index: 1500;
      display: none;
      cursor: pointer;
    }

    .fullscreen-overlay.active {
      display: block;
    }

    .fullscreen-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1600;
    }

    .fullscreen-overlay .fs-canvas {
      width: 100%;
      height: 100%;
    }

    .fullscreen-hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.85);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 1501;
      backdrop-filter: blur(8px);
    }

    .fullscreen-overlay.active .fullscreen-hint {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .fullscreen-overlay.active:hover .fullscreen-hint {
      opacity: 0;
    }

    /* ─── 滚动条 ─── */
    .controls-body::-webkit-scrollbar { width: 4px; }
    .controls-body::-webkit-scrollbar-track { background: transparent; }
    .controls-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .controls-body::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
    .controls::-webkit-scrollbar-track { background: transparent; }
    .controls::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .controls::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  </style>
</head>
<body>
  <!-- 左侧面板 -->
  <div class="controls">
    <div class="controls-header">
      <div class="controls-header-row">
        <h2>Mesh Gradient</h2>
        <div class="header-actions">
          <button class="icon-btn" id="gridToggleBtn" title="网格辅助线">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/>
            </svg>
          </button>
          <button class="icon-btn danger" id="clearBtn" title="清空所有点">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 6h18M8 6V4h8v2M5 6v14a1 1 0 001 1h12a1 1 0 001-1V6M10 11v6M14 11v6"/>
            </svg>
          </button>
        </div>
      </div>
      <p>点击画布添加颜色点 · 点击颜色点编辑</p>
    </div>

    <div class="controls-body">
      <!-- 画布背景 -->
      <div class="control-group">
        <div class="section-label">
          <span>画布背景</span>
        </div>
        <div class="color-input-row">
          <input type="color" id="baseColor" value="#FFFFFF">
          <input type="text" id="baseHex" value="#FFFFFF" placeholder="#000000">
        </div>
        <div style="margin-top: 10px;">
          <div class="section-label">
            <span>不透明度</span>
            <span class="value-tag" id="baseOpacityValue">100%</span>
          </div>
          <input type="range" id="baseOpacity" min="0" max="100" value="100">
        </div>
      </div>

      <div class="divider"></div>

      <!-- 点列表 -->
      <div class="control-group">
        <div class="section-label">
          <span>颜色点</span>
          <span class="value-tag" id="pointCount">0</span>
        </div>
        <div class="point-list" id="pointList"></div>
      </div>

      <div class="divider"></div>

      <!-- 输出 -->
      <div class="control-group">
        <div class="section-label">
          <span>CSS 输出</span>
        </div>
        <div class="output-code" id="outputCode"></div>
      </div>
    </div>

    <div class="controls-footer">
      <button class="btn btn-primary" id="copyBtn">复制 CSS</button>
      <button class="btn" id="downloadPngBtn">下载 PNG</button>
    </div>
  </div>

  <!-- 右侧画布 -->
  <div class="canvas-wrapper">
    <div class="canvas-container">
      <div class="canvas" id="canvas"></div>
      <div class="grid-overlay" id="gridOverlay"></div>

      <!-- 悬浮编辑菜单 -->
      <div class="point-popup" id="pointPopup">
        <div class="popup-row">
          <div class="popup-color-block">
            <div class="sv-picker" id="svPicker">
              <canvas id="svCanvas"></canvas>
              <div class="sv-cursor" id="svCursor"></div>
            </div>
            <div class="hue-bar" id="hueBar">
              <div class="hue-cursor" id="hueCursor"></div>
            </div>
            <div class="popup-hex-row">
              <input type="text" id="popupHex" value="#6DBDED" maxlength="7">
            </div>
          </div>
        </div>
        <div class="popup-row">
          <label>模糊半径 <span class="val" id="popupBlurVal">200px</span></label>
          <input type="range" id="popupBlur" min="50" max="500" value="200">
        </div>
        <div class="popup-row">
          <label>不透明度 <span class="val" id="popupOpacityVal">50%</span></label>
          <input type="range" id="popupOpacity" min="10" max="100" value="50">
        </div>
        <div class="popup-actions">
          <button id="popupDeleteBtn" class="popup-delete">删除</button>
        </div>
      </div>
    </div>
    <div class="coord-display" id="coordDisplay">X: 0% Y: 0%</div>
  </div>

  <div class="toast" id="toast">已复制!</div>

  <!-- 全屏预览 -->
  <div class="fullscreen-overlay" id="fullscreenOverlay">
    <div class="fs-canvas" id="fullscreenCanvas"></div>
    <div class="fullscreen-hint">点击任意处退出</div>
  </div>

  <div class="fullscreen-toggle">
    <button class="icon-btn" id="fullscreenBtn" title="全屏预览">
      <svg id="fsIconExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 3H5a2 2 0 00-2 2v3m0 8v3a2 2 0 002 2h3m8-18h3a2 2 0 012 2v3m0 8v3a2 2 0 01-2 2h-3"/>
      </svg>
      <svg id="fsIconCollapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none;">
        <path d="M4 14h6m-6 0v6m0-6l6 6M20 10h-6m6 0V4m0 6l-6-6"/>
      </svg>
    </button>
  </div>

  <script>
    // 状态
    let points = [
      { id: 1, x: 20, y: 30, color: '#6DBDED', blur: 200, opacity: 50 },
      { id: 2, x: 50, y: 50, color: '#99F6F4', blur: 250, opacity: 45 },
      { id: 3, x: 80, y: 70, color: '#AAF875', blur: 220, opacity: 45 }
    ];
    let selectedPointId = null;
    let nextId = 4;
    let isDragging = false;
    let didDrag = false;
    let draggingPoint = null;
    let showGrid = false;
    let popupOpen = false;

    // DOM
    const canvas = document.getElementById('canvas');
    const canvasContainer = document.querySelector('.canvas-container');
    const gridOverlay = document.getElementById('gridOverlay');
    const pointList = document.getElementById('pointList');
    const pointCount = document.getElementById('pointCount');
    const outputCode = document.getElementById('outputCode');
    const toast = document.getElementById('toast');
    const coordDisplay = document.getElementById('coordDisplay');
    const baseColorEl = document.getElementById('baseColor');
    const baseHexEl = document.getElementById('baseHex');
    const baseOpacityEl = document.getElementById('baseOpacity');
    const baseOpacityValueEl = document.getElementById('baseOpacityValue');
    const popup = document.getElementById('pointPopup');
    const popupHex = document.getElementById('popupHex');
    const popupBlur = document.getElementById('popupBlur');
    const popupBlurVal = document.getElementById('popupBlurVal');
    const popupOpacity = document.getElementById('popupOpacity');
    const popupOpacityVal = document.getElementById('popupOpacityVal');

    // ─── HSV 取色器 ───
    const svPicker = document.getElementById('svPicker');
    const svCanvas = document.getElementById('svCanvas');
    const svCursor = document.getElementById('svCursor');
    const hueBar = document.getElementById('hueBar');
    const hueCursor = document.getElementById('hueCursor');

    let currentHue = 200;
    let currentSat = 0.5;
    let currentVal = 0.8;
    let svDragging = false;
    let hueDragging = false;

    function hsvToHex(h, s, v) {
      const c = v * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = v - c;
      let r, g, b;
      if (h < 60) { r = c; g = x; b = 0; }
      else if (h < 120) { r = x; g = c; b = 0; }
      else if (h < 180) { r = 0; g = c; b = x; }
      else if (h < 240) { r = 0; g = x; b = c; }
      else if (h < 300) { r = x; g = 0; b = c; }
      else { r = c; g = 0; b = x; }
      const toHex = (n) => Math.round((n + m) * 255).toString(16).padStart(2, '0');
      return '#' + toHex(r) + toHex(g) + toHex(b);
    }

    function hexToHsv(hex) {
      let r = parseInt(hex.slice(1, 3), 16) / 255;
      let g = parseInt(hex.slice(3, 5), 16) / 255;
      let b = parseInt(hex.slice(5, 7), 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const d = max - min;
      let h = 0, s = max === 0 ? 0 : d / max, v = max;
      if (d !== 0) {
        if (max === r) h = 60 * (((g - b) / d) % 6);
        else if (max === g) h = 60 * ((b - r) / d + 2);
        else h = 60 * ((r - g) / d + 4);
        if (h < 0) h += 360;
      }
      return { h, s, v };
    }

    function renderSVCanvas() {
      const rect = svPicker.getBoundingClientRect();
      const w = Math.max(1, Math.round(rect.width));
      const h = Math.max(1, Math.round(rect.height));
      svCanvas.width = w;
      svCanvas.height = h;
      const ctx = svCanvas.getContext('2d');
      // 底色：当前 hue 的纯色
      ctx.fillStyle = `hsl(${currentHue}, 100%, 50%)`;
      ctx.fillRect(0, 0, w, h);
      // 白色→透明渐变（饱和度）
      const whiteGrad = ctx.createLinearGradient(0, 0, w, 0);
      whiteGrad.addColorStop(0, '#fff');
      whiteGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = whiteGrad;
      ctx.fillRect(0, 0, w, h);
      // 透明→黑色渐变（明度）
      const blackGrad = ctx.createLinearGradient(0, 0, 0, h);
      blackGrad.addColorStop(0, 'rgba(0,0,0,0)');
      blackGrad.addColorStop(1, '#000');
      ctx.fillStyle = blackGrad;
      ctx.fillRect(0, 0, w, h);
    }

    function updatePickerCursors() {
      const svRect = svPicker.getBoundingClientRect();
      svCursor.style.left = (currentSat * 100) + '%';
      svCursor.style.top = ((1 - currentVal) * 100) + '%';
      svCursor.style.backgroundColor = hsvToHex(currentHue, currentSat, currentVal);
      hueCursor.style.left = (currentHue / 360 * 100) + '%';
      hueCursor.style.backgroundColor = `hsl(${currentHue}, 100%, 50%)`;
    }

    function setPickerFromHex(hex) {
      const hsv = hexToHsv(hex);
      currentHue = hsv.h;
      currentSat = hsv.s;
      currentVal = hsv.v;
      renderSVCanvas();
      updatePickerCursors();
    }

    function applyPickerColor() {
      const hex = hsvToHex(currentHue, currentSat, currentVal);
      const point = points.find(p => p.id === selectedPointId);
      if (point) {
        point.color = hex;
        popupHex.value = hex.toUpperCase();
        renderPoints();
        renderPointList();
        updateBackground();
      }
    }

    // SV 区域交互
    function handleSVMove(e) {
      const rect = svPicker.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
      currentSat = x;
      currentVal = 1 - y;
      updatePickerCursors();
      applyPickerColor();
    }

    svPicker.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      svDragging = true;
      handleSVMove(e);
    });

    // Hue 条交互
    function handleHueMove(e) {
      const rect = hueBar.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      currentHue = x * 360;
      renderSVCanvas();
      updatePickerCursors();
      applyPickerColor();
    }

    hueBar.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      hueDragging = true;
      handleHueMove(e);
    });

    document.addEventListener('mousemove', (e) => {
      if (svDragging) handleSVMove(e);
      if (hueDragging) handleHueMove(e);
    });

    document.addEventListener('mouseup', () => {
      svDragging = false;
      hueDragging = false;
    });

    function init() {
      renderPoints();
      renderPointList();
      updateBackground();
    }

    function renderPoints() {
      canvas.querySelectorAll('.gradient-point').forEach(el => el.remove());
      points.forEach(point => {
        const el = document.createElement('div');
        el.className = 'gradient-point' + (point.id === selectedPointId ? ' selected' : '');
        el.style.left = point.x + '%';
        el.style.top = point.y + '%';
        el.style.backgroundColor = point.color;
        el.dataset.id = point.id;

        const ring = document.createElement('div');
        ring.className = 'blur-ring';
        ring.style.width = (point.blur * 2 / canvas.clientWidth * 100) + '%';
        ring.style.height = (point.blur * 2 / canvas.clientHeight * 100) + '%';
        ring.style.left = point.x + '%';
        ring.style.top = point.y + '%';
        el.appendChild(ring);

        el.addEventListener('mousedown', (e) => startDrag(e, point));
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          if (didDrag) return;
          if (popupOpen && selectedPointId === point.id) {
            closePopup();
          } else {
            selectPoint(point.id);
            openPopup(point);
          }
        });
        canvas.appendChild(el);
      });
      pointCount.textContent = points.length;
    }

    function renderPointList() {
      pointList.innerHTML = '';
      points.forEach(point => {
        const item = document.createElement('div');
        item.className = 'point-item' + (point.id === selectedPointId ? ' selected' : '');
        item.innerHTML = `
          <div class="point-color" style="background: ${point.color}"></div>
          <div class="point-info">
            <div class="point-hex">${point.color.toUpperCase()}</div>
            <div class="point-pos">${Math.round(point.x)}%, ${Math.round(point.y)}%</div>
          </div>
          <div class="point-actions">
            <button class="point-btn" data-action="edit" data-id="${point.id}">Edit</button>
            <button class="point-btn point-btn-delete" data-action="delete" data-id="${point.id}">&#x2715;</button>
          </div>
        `;

        item.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
          e.stopPropagation();
          selectPoint(point.id);
          openPopup(point);
        });

        item.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
          e.stopPropagation();
          deletePoint(point.id);
        });

        item.addEventListener('click', () => {
          if (popupOpen && selectedPointId === point.id) {
            closePopup();
          } else {
            selectPoint(point.id);
            openPopup(point);
          }
        });
        pointList.appendChild(item);
      });
    }

    function selectPoint(id) {
      selectedPointId = id;
      renderPoints();
      renderPointList();
    }

    function deletePoint(id) {
      if (points.length <= 1) {
        showToast('至少保留一个颜色点');
        return;
      }
      points = points.filter(p => p.id !== id);
      if (selectedPointId === id) {
        selectedPointId = null;
        closePopup();
      }
      renderPoints();
      renderPointList();
      updateBackground();
      showToast('已删除');
    }

    // ─── 悬浮菜单 ───
    function openPopup(point) {
      popupHex.value = point.color.toUpperCase();
      popupBlur.value = point.blur;
      popupBlurVal.textContent = point.blur + 'px';
      popupOpacity.value = point.opacity;
      popupOpacityVal.textContent = point.opacity + '%';
      popupOpen = true;
      positionPopup(point);
      popup.classList.add('visible');
      requestAnimationFrame(() => setPickerFromHex(point.color));
    }

    function closePopup() {
      popupOpen = false;
      popup.classList.remove('visible');
    }

    function positionPopup(point) {
      const rect = canvasContainer.getBoundingClientRect();
      const px = (point.x / 100) * rect.width;
      const py = (point.y / 100) * rect.height;

      const popupW = 220;
      const popupH = popup.offsetHeight || 260;
      const gap = 12;

      let left = px + gap;
      let top = py - popupH / 2;

      // 右侧放不下就放左侧
      if (left + popupW + gap > rect.width) {
        left = px - popupW - gap;
      }
      // 边界限制
      if (left < gap) left = gap;
      if (top < gap) top = gap;
      if (top + popupH + gap > rect.height) top = rect.height - popupH - gap;

      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
    }

    // 悬浮菜单事件
    popupHex.addEventListener('input', (e) => {
      if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) {
        const point = points.find(p => p.id === selectedPointId);
        if (point) {
          point.color = e.target.value;
          setPickerFromHex(e.target.value);
          renderPoints();
          renderPointList();
          updateBackground();
        }
      }
    });

    popupBlur.addEventListener('input', (e) => {
      const point = points.find(p => p.id === selectedPointId);
      if (point) {
        point.blur = parseInt(e.target.value);
        popupBlurVal.textContent = point.blur + 'px';
        renderPoints();
        updateBackground();
      }
    });

    popupOpacity.addEventListener('input', (e) => {
      const point = points.find(p => p.id === selectedPointId);
      if (point) {
        point.opacity = parseInt(e.target.value);
        popupOpacityVal.textContent = point.opacity + '%';
        updateBackground();
      }
    });

    document.getElementById('popupDeleteBtn').addEventListener('click', () => {
      if (selectedPointId) deletePoint(selectedPointId);
    });

    // 点击 popup 内部不关闭
    popup.addEventListener('mousedown', (e) => e.stopPropagation());
    popup.addEventListener('click', (e) => e.stopPropagation());

    // ─── 背景 ───
    function updateBackground() {
      const baseColorValue = baseColorEl.value;
      const baseOpVal = baseOpacityEl.value / 100;
      const baseColorWithOpacity = hexToRgba(baseColorValue, baseOpVal);

      const radialGradients = points.map(point => {
        const rgba = hexToRgba(point.color, point.opacity / 100);
        return `radial-gradient(circle at ${point.x}% ${point.y}%, ${rgba}, transparent ${point.blur}px)`;
      });

      const baseGradient = `linear-gradient(136deg, ${baseColorWithOpacity} 0%, ${baseColorWithOpacity} 100%)`;
      const allGradients = [...radialGradients, baseGradient].join(',\n  ');

      const css = `background:\n  ${allGradients};`;
      canvas.style.background = allGradients;
      outputCode.textContent = css;
    }

    // ─── 拖拽 ───
    function startDrag(e, point) {
      e.stopPropagation();
      isDragging = true;
      didDrag = false;
      draggingPoint = point;
      const el = canvas.querySelector(`[data-id="${point.id}"]`);
      el.classList.add('dragging');
    }

    function handleMove(e) {
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      coordDisplay.textContent = `X: ${Math.round(x)}%  Y: ${Math.round(y)}%`;

      if (!isDragging || !draggingPoint) return;
      didDrag = true;

      // 拖拽时关闭 popup
      if (popupOpen) closePopup();

      draggingPoint.x = Math.max(0, Math.min(100, x));
      draggingPoint.y = Math.max(0, Math.min(100, y));
      renderPoints();
      renderPointList();
      updateBackground();
    }

    function handleUp() {
      if (isDragging && draggingPoint) {
        const el = canvas.querySelector(`[data-id="${draggingPoint.id}"]`);
        if (el) el.classList.remove('dragging');
      }
      isDragging = false;
      draggingPoint = null;
      // 延迟重置，让 click 事件能判断
      setTimeout(() => { didDrag = false; }, 10);
    }

    // 点击画布空白处：关闭 popup + 添加点
    function handleCanvasClick(e) {
      if (isDragging || didDrag) return;

      // 关闭 popup
      if (popupOpen) {
        closePopup();
        selectedPointId = null;
        renderPoints();
        renderPointList();
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;

      const colors = ['#6DBDED', '#99F6F4', '#AAF875', '#A78BFA', '#FB923C', '#FBBF24'];
      const randomColor = colors[Math.floor(Math.random() * colors.length)];

      const newPoint = { id: nextId++, x, y, color: randomColor, blur: 200, opacity: 50 };
      points.push(newPoint);
      selectPoint(newPoint.id);
      renderPoints();
      renderPointList();
      updateBackground();
    }

    // ─── 工具函数 ───
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16)
      };
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // ─── 事件绑定 ───
    canvas.addEventListener('mousedown', (e) => {
      if (e.target === canvas || e.target.classList.contains('blur-ring')) {
        handleCanvasClick(e);
      }
    });

    document.addEventListener('mousemove', handleMove);
    document.addEventListener('mouseup', handleUp);

    baseColorEl.addEventListener('input', (e) => {
      baseHexEl.value = e.target.value.toUpperCase();
      updateBackground();
    });

    baseHexEl.addEventListener('input', (e) => {
      if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) {
        baseColorEl.value = e.target.value;
        updateBackground();
      }
    });

    baseOpacityEl.addEventListener('input', (e) => {
      baseOpacityValueEl.textContent = e.target.value + '%';
      updateBackground();
    });

    const fsOverlay = document.getElementById('fullscreenOverlay');
    const fsCanvas = document.getElementById('fullscreenCanvas');
    const fsBtn = document.getElementById('fullscreenBtn');
    const fsExpand = document.getElementById('fsIconExpand');
    const fsCollapse = document.getElementById('fsIconCollapse');

    function toggleFullscreen(on) {
      if (on) {
        fsCanvas.style.background = canvas.style.background;
        fsOverlay.classList.add('active');
        fsExpand.style.display = 'none';
        fsCollapse.style.display = 'block';
        fsBtn.title = '退出全屏';
      } else {
        fsOverlay.classList.remove('active');
        fsExpand.style.display = 'block';
        fsCollapse.style.display = 'none';
        fsBtn.title = '全屏预览';
      }
    }

    fsBtn.addEventListener('click', () => {
      toggleFullscreen(!fsOverlay.classList.contains('active'));
    });

    fsOverlay.addEventListener('click', () => {
      toggleFullscreen(false);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') toggleFullscreen(false);
    });

    document.getElementById('gridToggleBtn').addEventListener('click', () => {
      showGrid = !showGrid;
      gridOverlay.classList.toggle('visible', showGrid);
      document.getElementById('gridToggleBtn').classList.toggle('active', showGrid);
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(outputCode.textContent).then(() => showToast('CSS 已复制'));
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (points.length === 0) return;
      if (confirm('确定清空所有颜色点？')) {
        points = [];
        selectedPointId = null;
        closePopup();
        renderPoints();
        renderPointList();
        updateBackground();
        showToast('已清空');
      }
    });

    document.getElementById('downloadPngBtn').addEventListener('click', () => {
      const canvasEl = document.createElement('canvas');
      const w = canvasContainer.clientWidth;
      const h = canvasContainer.clientHeight;
      canvasEl.width = w;
      canvasEl.height = h;
      const ctx = canvasEl.getContext('2d');

      const baseColorValue = baseColorEl.value;
      const baseOpVal = baseOpacityEl.value / 100;
      const baseColorWithOpacity = hexToRgba(baseColorValue, baseOpVal);

      const gradient = ctx.createLinearGradient(0, 0, w, h);
      gradient.addColorStop(0, baseColorWithOpacity);
      gradient.addColorStop(1, baseColorWithOpacity);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);

      points.forEach(point => {
        const rgba = hexToRgba(point.color, point.opacity / 100);
        const rg = ctx.createRadialGradient(
          (point.x / 100) * w, (point.y / 100) * h, 0,
          (point.x / 100) * w, (point.y / 100) * h, point.blur
        );
        rg.addColorStop(0, rgba);
        rg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = rg;
        ctx.fillRect(
          (point.x / 100) * w - point.blur,
          (point.y / 100) * h - point.blur,
          point.blur * 2, point.blur * 2
        );
      });

      const link = document.createElement('a');
      link.download = `gradient-${Date.now()}.png`;
      link.href = canvasEl.toDataURL('image/png', 1.0);
      link.click();
      showToast('PNG 已下载');
    });

    window.addEventListener('resize', () => {
      renderPoints();
      updateBackground();
      if (popupOpen && selectedPointId) {
        const point = points.find(p => p.id === selectedPointId);
        if (point) positionPopup(point);
      }
    });

    init();
  </script>
</body>
</html>
